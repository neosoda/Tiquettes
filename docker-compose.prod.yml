# Production-grade docker-compose for Coolify deployment
# Build args are set from environment variables - configure in Coolify dashboard
version: '3.8'

services:
  vpanel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time env vars (baked into Vite bundle)
        # Set these in Coolify "Build Arguments" or via .env file
        VITE_APP_BASE: ${VITE_APP_BASE:-.}
        VITE_APP_URL: ${VITE_APP_URL:-https://example.com}
        VITE_APP_API_URL: ${VITE_APP_API_URL:-/api/}
        VITE_USE_AUTH: ${VITE_USE_AUTH:-false}
    
    image: vpanel:latest
    container_name: vpanel-prod
    restart: always
    
    # Port binding - localhost only, Coolify proxy forwards from internet
    ports:
      - "127.0.0.1:8080:8080"
    
    environment:
      # Runtime PHP configuration (can be overridden without rebuild)
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-20}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-4}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-2}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-10}
      
      # Production mode
      APP_ENV: production
    
    # Health check - critical for Coolify orchestration
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/infos.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    # Logging - JSON driver for log aggregation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "vpanel-prod"
    
    # Security - least privilege principle
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for port 8080
    
    # Resource limits - adjust based on infrastructure
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Volumes - persistent storage only
    volumes:
      # User projects (optional, can be disabled)
      - vpanel_projects:/app/projects:rw
      
      # System timezone consistency
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    # Network - custom bridge for Coolify
    networks:
      - vpanel-net

# Network
networks:
  vpanel-net:
    driver: bridge

# Persistent volumes
volumes:
  vpanel_projects:
    driver: local
