version: '3.8'

services:
  vpanel:
    build:
      context: .
      dockerfile: Dockerfile
      # No build args - uses .env.coolify defaults or Dockerfile defaults
    
    container_name: vpanel-app
    restart: unless-stopped
    
    # Port binding restricted to localhost (dev mode)
    ports:
      - "127.0.0.1:${VPANEL_PORT:-8080}:8080"
    
    environment:
      # PHP-FPM Configuration (can be overridden at runtime)
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-10}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-2}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-5}
      
      # App Settings
      APP_ENV: development
    
    # Volumes - only persistent storage
    volumes:
      # Projects storage (optional, can be commented out)
      - vpanel_projects:/app/projects:rw
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/infos.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "vpanel-dev"

volumes:
  vpanel_projects:
    driver: local
