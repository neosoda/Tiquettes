; =============================================================
; PHP-FPM — pool Tiquettes (zzz-tiquettes.conf)
; Ce fichier surcharge le pool www par défaut de l'image
; php:8.2-fpm-alpine pour adapter l'utilisateur et le répertoire
; de travail aux chemins utilisés par le projet.
; =============================================================

[www]
; Écoute sur loopback uniquement (Nginx sur le même conteneur)
listen = 127.0.0.1:9000

; Exécution sous www-data pour limiter les privilèges
user  = www-data
group = www-data

; Répertoire de travail par défaut pour les scripts PHP
; Permet à require('./libs/...') de résoudre correctement
chdir = /var/www/api

; Mode de gestion des processus
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests      = 500

; Logs d'erreurs PHP-FPM
php_admin_value[error_log]       = /var/log/php-fpm/error.log
php_admin_flag[log_errors]       = on
php_flag[display_errors]         = off
php_flag[display_startup_errors] = off

; Limites PHP
php_admin_value[memory_limit]       = 256M
php_admin_value[upload_max_filesize] = 16M
php_admin_value[post_max_size]       = 16M
php_admin_value[max_execution_time]  = 120
